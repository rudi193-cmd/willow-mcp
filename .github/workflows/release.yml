name: Release

# Publishes to PyPI when a version tag is pushed (e.g. `git tag v2.0.0 && git push --tags`).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time setup before the first release:
#   1. On PyPI: project → Publishing → add a trusted publisher for this repo,
#      workflow `release.yml`, environment `pypi`.
#   2. Create a GitHub environment named `pypi` (Settings → Environments).
# Until that is configured, this workflow is inert — nothing publishes without a tag.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
