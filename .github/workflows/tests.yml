name: Tests

on:
  push:
  pull_request:
  schedule:
    # Daily, off the :00/:30 marks to avoid GitHub's peak-load minutes.
    # Catches drift that no push/PR would surface — a new Postgres/Python
    # point release, a transitive dependency bump, kartikeya's own updates —
    # since this repo can otherwise go quiet for a while between changes.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e "." pytest

      - name: Run tests
        run: python -m pytest tests/ -q
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: CLI smoke test — gates / tree / permissions
        # Exercises the actual `willow-mcp` console-script entry point end to
        # end (not just the underlying functions the unit tests already
        # cover), so a broken packaging/entry-point/argparse wiring would
        # fail here even if every unit test still passes.
        run: |
          set -euo pipefail
          export WILLOW_HOME="${RUNNER_TEMP}/willow_home"
          mkdir -p "${WILLOW_HOME}/mcp_apps/smoketest"
          echo '{"permissions": ["full_access"]}' > "${WILLOW_HOME}/mcp_apps/smoketest/manifest.json"

          willow-mcp gates smoketest --json > "${RUNNER_TEMP}/gates.json"
          python -c "import json; json.load(open('${RUNNER_TEMP}/gates.json'))"
          willow-mcp gates --html "${RUNNER_TEMP}/gates.html"
          test -s "${RUNNER_TEMP}/gates.html"

          willow-mcp allow-permission smoketest store_read
          grep -q store_read "${WILLOW_HOME}/mcp_apps/smoketest/manifest.json"
          willow-mcp deny-permission smoketest store_read

          willow-mcp grant-net smoketest --ttl 5m --reason "CI smoke test"
          # Captured via command substitution, not a live pipe: net-status
          # prints several lines, and piping straight into `grep -q` races
          # grep's early exit against the still-writing process.
          NET_STATUS="$(willow-mcp net-status smoketest)"
          echo "${NET_STATUS}" | grep -q active
          willow-mcp revoke-net smoketest

          willow-mcp tree smoketest --json > "${RUNNER_TEMP}/tree.json"
          python -c "import json; d=json.load(open('${RUNNER_TEMP}/tree.json')); assert set(d) >= {'trunk','sap','canopy','roots','rings','leaves','litter','stomata'}, d.keys()"
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
