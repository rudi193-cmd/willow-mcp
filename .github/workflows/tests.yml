name: Tests

on:
  push:
    # Master only — an unfiltered push trigger plus pull_request ran CI
    # twice on every PR commit.
    branches: [master]
  pull_request:
  schedule:
    # Daily, off the :00/:30 marks to avoid GitHub's peak-load minutes.
    # Catches drift that no push/PR would surface — a new Postgres/Python
    # point release, a transitive dependency bump, kartikeya's own updates —
    # since this repo can otherwise go quiet for a while between changes.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor and current for requires-python >= 3.11.
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Path guard
        run: bash scripts/path_guard.sh

      - name: Install dependencies
        run: pip install -e "." pytest

      - name: Run tests
        run: python -m pytest tests/ -q
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: CLI smoke test — gates / tree / permissions
        # Exercises the actual `willow-mcp` console-script entry point end to
        # end (not just the underlying functions the unit tests already
        # cover), so a broken packaging/entry-point/argparse wiring would
        # fail here even if every unit test still passes.
        run: |
          set -euo pipefail
          export WILLOW_HOME="${RUNNER_TEMP}/willow_home"
          mkdir -p "${WILLOW_HOME}/mcp_apps/smoketest"
          echo '{"permissions": ["full_access"]}' > "${WILLOW_HOME}/mcp_apps/smoketest/manifest.json"

          willow-mcp gates smoketest --json > "${RUNNER_TEMP}/gates.json"
          python -c "import json; json.load(open('${RUNNER_TEMP}/gates.json'))"
          willow-mcp gates --html "${RUNNER_TEMP}/gates.html"
          test -s "${RUNNER_TEMP}/gates.html"

          willow-mcp allow-permission smoketest store_read
          grep -q store_read "${WILLOW_HOME}/mcp_apps/smoketest/manifest.json"
          willow-mcp deny-permission smoketest store_read

          willow-mcp grant-net smoketest --ttl 5m --reason "CI smoke test"
          # Captured via command substitution, not a live pipe: net-status
          # prints several lines, and piping straight into `grep -q` races
          # grep's early exit against the still-writing process.
          NET_STATUS="$(willow-mcp net-status smoketest)"
          echo "${NET_STATUS}" | grep -q active
          willow-mcp revoke-net smoketest

          willow-mcp tree smoketest --json > "${RUNNER_TEMP}/tree.json"
          python -c "import json; d=json.load(open('${RUNNER_TEMP}/tree.json')); assert set(d) >= {'trunk','sap','canopy','roots','rings','leaves','litter','stomata'}, d.keys()"

          # Subject-consent read path (grant/revoke need an operator tty, so only
          # the read-only status is smokeable here). Captured, not piped.
          CONSENT_STATUS="$(willow-mcp consent-status ci-smoke-subject)"
          echo "${CONSENT_STATUS}" | python -c "import json,sys; d=json.load(sys.stdin); assert d['granted_scopes']==[] and d['subject_id']=='ci-smoke-subject', d"
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres

      - name: CLI smoke test — live gates --serve dashboard
        # willow-mcp gates --serve starts a real local HTTP server with
        # working buttons (not a snapshot) — start it, hit its actual HTTP
        # API the same way the page's own JS does, confirm a button click
        # equivalent (POST /api/action) really flips the manifest on disk,
        # then tear it down. Catches regressions in gates_serve.py/
        # gates_actions.py that unit tests (which call Python functions
        # directly, no HTTP) wouldn't see — a broken route, a serialization
        # bug, uvicorn/Starlette wiring.
        run: |
          set -euo pipefail
          export WILLOW_HOME="${RUNNER_TEMP}/willow_home"
          willow-mcp gates smoketest --serve --port 8788 &
          SERVER_PID=$!
          trap 'kill "${SERVER_PID}" 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8788/api/state > /dev/null && break
            sleep 0.3
          done
          curl -sf http://127.0.0.1:8788/ | grep -q 'const APP_ID = "smoketest";'
          curl -sf -X POST http://127.0.0.1:8788/api/action \
            -H "Content-Type: application/json" \
            -d '{"row_id":"perm.smoketest.store_read","inputs":{}}' \
            | python -c "import json,sys; d=json.load(sys.stdin); assert d['ok'], d"
          grep -q store_read "${WILLOW_HOME}/mcp_apps/smoketest/manifest.json"
          kill "${SERVER_PID}"
          trap - EXIT
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres

  # Aggregate gate: branch protection requires a check named exactly "test".
  # The matrix legs report as "test-matrix (3.11)" / "test-matrix (3.12)";
  # this job carries the required name and only runs when every leg passed
  # (a failed or skipped leg leaves it un-run, keeping the merge blocked).
  test:
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - run: echo "all matrix legs green"
